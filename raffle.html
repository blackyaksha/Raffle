<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Raffle Draw</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #ffffff;
    --bg-secondary: #f5f5f4;
    --bg-tertiary: #f0efea;
    --text: #1a1a19;
    --text-secondary: #6b6b68;
    --border: rgba(0,0,0,0.12);
    --border-hover: rgba(0,0,0,0.25);
    --purple-bg: #EEEDFE;
    --purple: #534AB7;
    --purple-dark: #3C3489;
    --purple-text: #3C3489;
    --radius-md: 8px;
    --radius-lg: 12px;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1c1c1a;
      --bg-secondary: #2a2a27;
      --bg-tertiary: #232320;
      --text: #f0efe8;
      --text-secondary: #9e9d98;
      --border: rgba(255,255,255,0.12);
      --border-hover: rgba(255,255,255,0.25);
      --purple-bg: #26215C;
      --purple: #AFA9EC;
      --purple-dark: #CECBF6;
      --purple-text: #CECBF6;
    }
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg-tertiary);
    color: var(--text);
    min-height: 100vh;
    padding: 2rem 1rem;
  }

  #app {
    max-width: 620px;
    margin: 0 auto;
  }

  .page-title {
    font-size: 26px;
    font-weight: 600;
    margin-bottom: 4px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .page-sub {
    font-size: 14px;
    color: var(--text-secondary);
    margin-bottom: 1.75rem;
  }

  .card {
    background: var(--bg);
    border: 0.5px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 1.25rem;
    margin-bottom: 1rem;
  }

  .upload-area {
    border: 1.5px dashed var(--border-hover);
    border-radius: var(--radius-lg);
    padding: 2.5rem 1.5rem;
    text-align: center;
    cursor: pointer;
    transition: background 0.15s;
    user-select: none;
  }

  .upload-area:hover, .upload-area.dragover {
    background: var(--bg-secondary);
  }

  .upload-area .icon {
    font-size: 40px;
    margin-bottom: 10px;
    display: block;
  }

  .upload-area p {
    font-size: 15px;
    color: var(--text);
    margin-bottom: 4px;
  }

  .upload-area small {
    font-size: 13px;
    color: var(--text-secondary);
  }

  #fileInput { display: none; }

  .stats {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 8px;
    margin-bottom: 1rem;
  }

  .stat {
    background: var(--bg-secondary);
    border-radius: var(--radius-md);
    padding: 0.75rem;
    text-align: center;
  }

  .stat-num {
    font-size: 24px;
    font-weight: 600;
    color: var(--text);
    line-height: 1;
  }

  .stat-lbl {
    font-size: 11px;
    color: var(--text-secondary);
    margin-top: 4px;
    text-transform: uppercase;
    letter-spacing: 0.03em;
  }

  .col-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 1rem;
  }

  .col-row label {
    font-size: 13px;
    color: var(--text-secondary);
    white-space: nowrap;
  }

  select {
    flex: 1;
    padding: 7px 10px;
    border: 0.5px solid var(--border-hover);
    border-radius: var(--radius-md);
    background: var(--bg);
    color: var(--text);
    font-size: 13px;
    cursor: pointer;
  }

  .file-name {
    font-size: 13px;
    color: var(--text-secondary);
    margin-top: 10px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .winner-box {
    min-height: 120px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 1rem;
    text-align: center;
  }

  .winner-name {
    font-size: 30px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 6px;
    word-break: break-word;
  }

  .winner-meta {
    font-size: 13px;
    color: var(--text-secondary);
  }

  .placeholder-text {
    font-size: 14px;
    color: var(--text-secondary);
  }

  @keyframes roll {
    0%   { opacity: 0.2; transform: scale(0.97); }
    50%  { opacity: 1;   transform: scale(1); }
    100% { opacity: 0.2; transform: scale(0.97); }
  }

  .rolling { animation: roll 0.12s steps(1) infinite; }

  @keyframes pop {
    0%   { transform: scale(0.85); opacity: 0; }
    60%  { transform: scale(1.06); }
    100% { transform: scale(1);    opacity: 1; }
  }

  .pop { animation: pop 0.35s ease forwards; }

  .btn-row {
    display: flex;
    gap: 8px;
    margin-top: 1rem;
  }

  button {
    flex: 1;
    padding: 0.65rem 1rem;
    font-size: 14px;
    font-weight: 500;
    border: 0.5px solid var(--border-hover);
    border-radius: var(--radius-md);
    background: var(--bg);
    color: var(--text);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 7px;
    transition: background 0.12s, transform 0.1s;
  }

  button:hover:not(:disabled) { background: var(--bg-secondary); }
  button:active:not(:disabled) { transform: scale(0.98); }
  button:disabled { opacity: 0.38; cursor: not-allowed; }

  button.primary {
    background: var(--purple);
    color: #fff;
    border-color: var(--purple);
    font-size: 15px;
    padding: 0.75rem;
  }

  button.primary:hover:not(:disabled) {
    background: var(--purple-dark);
    border-color: var(--purple-dark);
  }

  .winners-section { display: none; }
  .winners-section.visible { display: block; }

  .winners-header {
    font-size: 13px;
    font-weight: 500;
    color: var(--text-secondary);
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .winner-list {
    list-style: none;
    max-height: 220px;
    overflow-y: auto;
  }

  .winner-list li {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 0;
    border-bottom: 0.5px solid var(--border);
    font-size: 14px;
    color: var(--text);
  }

  .winner-list li:last-child { border-bottom: none; }

  .badge {
    background: var(--purple-bg);
    color: var(--purple-text);
    font-size: 11px;
    font-weight: 600;
    padding: 2px 8px;
    border-radius: 99px;
    min-width: 28px;
    text-align: center;
    flex-shrink: 0;
  }

  .confetti-container {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 999;
    overflow: hidden;
  }

  .confetti-piece {
    position: absolute;
    width: 10px;
    height: 10px;
    opacity: 0;
    animation: confettiFall linear forwards;
  }

  @keyframes confettiFall {
    0%   { transform: translateY(-20px) rotate(0deg);   opacity: 1; }
    100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
  }

  .hidden { display: none; }

  /* scrollbar */
  .winner-list::-webkit-scrollbar { width: 4px; }
  .winner-list::-webkit-scrollbar-track { background: transparent; }
  .winner-list::-webkit-scrollbar-thumb { background: var(--border-hover); border-radius: 99px; }
</style>
</head>
<body>

<div id="app">
  <h1 class="page-title">🎲 Raffle Draw</h1>
  <p class="page-sub">Upload a CSV file with participant names, then draw winners one by one.</p>

  <!-- Upload -->
  <div class="card">
    <div class="upload-area" id="dropZone" onclick="document.getElementById('fileInput').click()" role="button" tabindex="0" aria-label="Upload CSV file">
      <span class="icon">📂</span>
      <p><strong>Click to upload</strong> or drag &amp; drop</p>
      <small>CSV file with a column of names</small>
    </div>
    <input type="file" id="fileInput" accept=".csv">
    <div class="file-name hidden" id="fileName">📄 <span id="fileNameText"></span></div>
  </div>

  <!-- Config -->
  <div class="card hidden" id="configCard">
    <div class="col-row">
      <label for="colSelect">Name column:</label>
      <select id="colSelect"></select>
    </div>
    <div class="stats">
      <div class="stat"><div class="stat-num" id="totalCount">0</div><div class="stat-lbl">Total</div></div>
      <div class="stat"><div class="stat-num" id="drawnCount">0</div><div class="stat-lbl">Drawn</div></div>
      <div class="stat"><div class="stat-num" id="remainCount">0</div><div class="stat-lbl">Remaining</div></div>
    </div>
  </div>

  <!-- Draw -->
  <div class="card hidden" id="drawCard">
    <div class="winner-box" id="winnerBox">
      <div class="placeholder-text">Press "Draw Winner" to start</div>
    </div>
    <div class="btn-row">
      <button class="primary" id="drawBtn" disabled onclick="drawWinner()">🏆 Draw winner</button>
    </div>
    <div class="btn-row">
      <button id="resetBtn" disabled onclick="resetAll()">🔄 Reset all</button>
      <button id="exportBtn" disabled onclick="exportWinners()">⬇️ Export winners</button>
    </div>
  </div>

  <!-- Winners list -->
  <div class="card winners-section" id="winnersCard">
    <div class="winners-header">🎉 Winners so far</div>
    <ul class="winner-list" id="winnerList"></ul>
  </div>
</div>

<div class="confetti-container" id="confetti"></div>

<script>
  let allNames = [], remaining = [], winners = [];
  let rolling = false, rollInterval = null;
  let csvLines = [], csvHeaders = [];

  const fileInput   = document.getElementById('fileInput');
  const dropZone    = document.getElementById('dropZone');
  const colSelect   = document.getElementById('colSelect');
  const configCard  = document.getElementById('configCard');
  const drawCard    = document.getElementById('drawCard');
  const winnersCard = document.getElementById('winnersCard');
  const drawBtn     = document.getElementById('drawBtn');
  const resetBtn    = document.getElementById('resetBtn');
  const exportBtn   = document.getElementById('exportBtn');
  const winnerBox   = document.getElementById('winnerBox');
  const winnerList  = document.getElementById('winnerList');
  const fileName    = document.getElementById('fileName');
  const fileNameText= document.getElementById('fileNameText');

  fileInput.addEventListener('change', e => { if (e.target.files[0]) parseCSV(e.target.files[0]); });
  dropZone.addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === ' ') fileInput.click(); });
  dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragover'); });
  dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
  dropZone.addEventListener('drop', e => {
    e.preventDefault();
    dropZone.classList.remove('dragover');
    if (e.dataTransfer.files[0]) parseCSV(e.dataTransfer.files[0]);
  });
  colSelect.addEventListener('change', loadColumn);

  function parseCSV(file) {
    fileNameText.textContent = file.name;
    fileName.classList.remove('hidden');
    const reader = new FileReader();
    reader.onload = e => {
      const text = e.target.result;
      const lines = text.trim().split(/\r?\n/);
      if (lines.length < 2) { alert('CSV must have at least a header row and one entry.'); return; }
      csvLines = lines;
      csvHeaders = parseRow(lines[0]);
      colSelect.innerHTML = '';
      csvHeaders.forEach((h, i) => {
        const opt = document.createElement('option');
        opt.value = i;
        opt.textContent = h || `Column ${i + 1}`;
        colSelect.appendChild(opt);
      });
      const best = csvHeaders.findIndex(h => /name/i.test(h));
      if (best >= 0) colSelect.value = best;
      configCard.classList.remove('hidden');
      drawCard.classList.remove('hidden');
      loadColumn();
    };
    reader.readAsText(file);
  }

  function parseRow(row) {
    const result = [];
    let cur = '', inQuote = false;
    for (let i = 0; i < row.length; i++) {
      const c = row[i];
      if (c === '"') { inQuote = !inQuote; }
      else if (c === ',' && !inQuote) { result.push(cur.trim()); cur = ''; }
      else { cur += c; }
    }
    result.push(cur.trim());
    return result;
  }

  function loadColumn() {
    const idx = parseInt(colSelect.value);
    allNames = [];
    for (let i = 1; i < csvLines.length; i++) {
      const cols = parseRow(csvLines[i]);
      const val = (cols[idx] || '').trim();
      if (val) allNames.push(val);
    }
    remaining = [...allNames];
    winners = [];
    updateStats();
    drawBtn.disabled = remaining.length === 0;
    resetBtn.disabled = true;
    exportBtn.disabled = true;
    winnersCard.classList.remove('visible');
    winnerList.innerHTML = '';
    winnerBox.innerHTML = '<div class="placeholder-text">Press "Draw Winner" to start</div>';
  }

  function updateStats() {
    document.getElementById('totalCount').textContent = allNames.length;
    document.getElementById('drawnCount').textContent = winners.length;
    document.getElementById('remainCount').textContent = remaining.length;
  }

  function drawWinner() {
    if (rolling || remaining.length === 0) return;
    rolling = true;
    drawBtn.disabled = true;
    let ticks = 0;
    const totalTicks = 20 + Math.floor(Math.random() * 15);
    rollInterval = setInterval(() => {
      const r = remaining[Math.floor(Math.random() * remaining.length)];
      winnerBox.innerHTML = `<div class="winner-name rolling">${r}</div><div class="winner-meta">Drawing…</div>`;
      ticks++;
      if (ticks >= totalTicks) {
        clearInterval(rollInterval);
        const idx = Math.floor(Math.random() * remaining.length);
        const winner = remaining.splice(idx, 1)[0];
        winners.push(winner);
        winnerBox.innerHTML = `
          <div style="font-size:42px;margin-bottom:6px" class="pop">🎉</div>
          <div class="winner-name pop">${winner}</div>
          <div class="winner-meta">Winner #${winners.length}</div>`;
        updateStats();
        updateWinnerList();
        launchConfetti();
        rolling = false;
        drawBtn.disabled = remaining.length === 0;
        resetBtn.disabled = false;
        exportBtn.disabled = false;
        if (remaining.length === 0) {
          setTimeout(() => alert('🎊 All entries have been drawn!'), 400);
        }
      }
    }, 65);
  }

  function updateWinnerList() {
    winnersCard.classList.add('visible');
    winnerList.innerHTML = '';
    winners.slice().reverse().forEach((name, i) => {
      const li = document.createElement('li');
      li.innerHTML = `<span class="badge">#${winners.length - i}</span>${name}`;
      winnerList.appendChild(li);
    });
  }

  function resetAll() {
    if (!confirm('Reset everything? All drawn entries will return to the pool.')) return;
    remaining = [...allNames];
    winners = [];
    updateStats();
    drawBtn.disabled = false;
    resetBtn.disabled = true;
    exportBtn.disabled = true;
    winnersCard.classList.remove('visible');
    winnerList.innerHTML = '';
    winnerBox.innerHTML = '<div class="placeholder-text">Press "Draw Winner" to start</div>';
  }

  function exportWinners() {
    if (!winners.length) return;
    const rows = ['Draw Order,Name', ...winners.map((n, i) => `${i + 1},"${n.replace(/"/g, '""')}"`)];
    const blob = new Blob([rows.join('\n')], { type: 'text/csv' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'raffle-winners.csv';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
  }

  function launchConfetti() {
    const container = document.getElementById('confetti');
    const colors = ['#534AB7','#AFA9EC','#1D9E75','#5DCAA5','#D85A30','#F0997B','#BA7517','#EF9F27','#E24B4A'];
    container.innerHTML = '';
    for (let i = 0; i < 60; i++) {
      const piece = document.createElement('div');
      piece.className = 'confetti-piece';
      const size = 6 + Math.random() * 8;
      piece.style.cssText = `
        left: ${Math.random() * 100}%;
        top: -20px;
        width: ${size}px;
        height: ${size}px;
        background: ${colors[Math.floor(Math.random() * colors.length)]};
        border-radius: ${Math.random() > 0.5 ? '50%' : '2px'};
        animation-duration: ${1.2 + Math.random() * 1.4}s;
        animation-delay: ${Math.random() * 0.5}s;
      `;
      container.appendChild(piece);
    }
    setTimeout(() => { container.innerHTML = ''; }, 3000);
  }
</script>
</body>
</html>
